<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCTO | Agentic Engineering</title>
    <style>
      :root {
        color-scheme: dark;
        --brand-primary: #ed4c4c;
        --brand-secondary: #faa09a;
        --brand-tertiary: #ffd0cd;
        --bg-1: #0f0f12;
        --bg-2: #17171c;
        --panel: rgba(23, 23, 28, 0.9);
        --text: #f4f4f7;
        --muted: #a3a3b2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Sora", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(900px 700px at 88% -15%, rgba(237, 76, 76, 0.22), transparent 55%),
          radial-gradient(760px 640px at -10% 0%, rgba(250, 160, 154, 0.12), transparent 48%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      .card {
        width: min(760px, 100%);
        border: 1px solid rgba(250, 160, 154, 0.24);
        background: var(--panel);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 2.5rem;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.8rem;
      }
      .brand svg {
        width: 28px;
        height: 28px;
      }
      .brand span {
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      h1 {
        margin: 0 0 0.8rem;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.1;
      }
      p {
        margin: 0 0 1.5rem;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.25rem;
        font-weight: 700;
        color: #ffffff;
        background: var(--brand-primary);
        text-decoration: none;
      }
      .cta:hover {
        background: #d94444;
      }
      .meta {
        margin-top: 1rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <svg viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="6" fill="#ed4c4c" />
          <path d="M 6,21 A 9.5 9.5 0 1 1 22,13" stroke="white" stroke-width="2.5" stroke-linecap="round" />
          <circle cx="6" cy="21" r="1.5" fill="#ffd0cd" />
          <circle cx="22" cy="13" r="1.5" fill="#ffd0cd" />
          <polyline points="9,14 13,17 9,20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <polyline points="12,15.5 16,18.5 12,21.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>OpenCTO</span>
      </div>
      <h1>Agentic Engineering Platform</h1>
      <p>Build, ship, and operate production software with realtime voice control, tool orchestration, and autonomous execution.</p>
      <a class="cta" href="https://app.opencto.works">Open App</a>
      <div class="meta">use.opencto.works • app.opencto.works • auth.opencto.works</div>
    </main>
  </body>
</html>
