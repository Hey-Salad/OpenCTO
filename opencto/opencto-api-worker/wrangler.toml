name = "opencto-api-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

[env.production]
name = "opencto-api"
route = { pattern = "api.opencto.works/*", zone_name = "opencto.works" }
vars = { ENVIRONMENT = "production", OPENCTO_AGENT_BASE_URL = "https://cloud-services-api.opencto.works", APP_BASE_URL = "https://app.opencto.works", API_BASE_URL = "https://api.opencto.works" }
d1_databases = [
  { binding = "DB", database_name = "opencto-chat-store", database_id = "15dc6de2-6a21-406e-bcb2-f4caf94d45c4" },
]

[[d1_databases]]
binding = "DB"
database_name = "opencto-chat-store"
database_id = "15dc6de2-6a21-406e-bcb2-f4caf94d45c4"

[vars]
ENVIRONMENT = "production"
OPENCTO_AGENT_BASE_URL = "https://cloud-services-api.opencto.works"
APP_BASE_URL = "https://app.opencto.works"

# Cloudflare Containers MVP draft:
# - This worker will orchestrate run lifecycle and authorization.
# - The container runtime will execute approved commands only.
# - Container service binding values should be configured per environment.
#
# [containers]
# services = [
#   { binding = "CODEBASE_EXECUTOR", service = "opencto-codebase-executor", environment = "production" }
# ]
#
# [vars]
# CODEBASE_RUN_DEFAULT_TIMEOUT_SECONDS = "600"
# CODEBASE_RUN_MAX_TIMEOUT_SECONDS = "1800"

# Secrets (set via wrangler secret put):
# - OPENAI_API_KEY
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
# - JWT_SECRET
# - WEBAUTHN_RP_ID
# - WEBAUTHN_RP_NAME
# CTO agent external API keys:
# - VERCEL_TOKEN           (Vercel personal/team access token)
# - CF_API_TOKEN           (Cloudflare API token with Workers + Pages read permissions)
# - CF_ACCOUNT_ID          (Cloudflare account ID — visible in dashboard URL)
# - GITHUB_TOKEN           (GitHub Models PAT, if using GitHub inference proxy)
